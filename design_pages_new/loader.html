<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS LINK -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- BOOTSTRAP CSS LINK -->
    <link href="../assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../assets/css/bootstrap.min.css.map" rel="stylesheet" />
</head>
<body>
  <div class="progress-div">
    <div class="progress blue">
      <span class="progress-left">
          <span class="progress-bar"></span>
      </span>
      <span class="progress-right">
          <span class="progress-bar"></span>
      </span>
      <div class="progress-value"><span id="load-perc"></span><span>%</span></div>
    </div>
    <p class="loading-text">loading...</p>
  </div>

  <!-- BOOTSTRAP JQUERY/POPPER JS LINK -->
  <script src="../assets/js/popper.min.js"></script>
  <script src="../assets/js/jquery.min.js" type="text/javascript"></script>
  <script src="../assets/js/bootstrap.bundle.min.js" type="text/javascript"></script>
  <script>
    let counts = setInterval(updated, 35);
      let upto = 0;
      function updated() {
          let count = document.getElementById("load-perc");
          count.innerHTML = ++upto;
          if (upto === 100) {
              clearInterval(counts);
          }
    }
  </script>
</body>
</html>
