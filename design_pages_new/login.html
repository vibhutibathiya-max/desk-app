<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- BOOTSTRAP CSS LINK -->
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css.map">
    <!-- FONT AWESOME LINK -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">

</head>

<body>
    <!-- MAIN CONTAINER :: STARTS -->
    <div class="login-content">
        <!-- LOGIN CONTENT :: STARTS -->
        <div class="login-left-section">
            <div class="logo">
                <img src="../assets/img-new/logo-color.svg" alt="LOGO" width="" height="">
            </div>
            <div class="back">
                <svg width="12" height="20" viewBox="0 0 12 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10.2443 18.2229L1.71094 9.68958L10.2443 1.15625" stroke="var(--black-color)"
                        stroke-width="2.13333" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Back
            </div>

            <div class="login-form">
                <h3 class="heading">Login</h3>
                <p class="sub-heading">Login with username and password</p>
                <!-- INPUT FILED :: STARTS -->
                <div class="login-fields">
                    <div class="input-group mb-3">
                        <div class="protocol-select-wrapper">
                            <select class="form-select" id="protocolSelect">
                                <option value="https" selected>HTTPS</option>
                                <option value="http">HTTP</option>
                            </select>
                            <span class="protocol-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 19 19"
                                    fill="none">
                                    <path
                                        d="M9.5 16.625C10.4357 16.625 11.3622 16.4407 12.2266 16.0826C13.0911 15.7246 13.8765 15.1998 14.5381 14.5381C15.1998 13.8765 15.7246 13.0911 16.0826 12.2266C16.4407 11.3622 16.625 10.4357 16.625 9.5C16.625 8.56433 16.4407 7.63783 16.0826 6.77338C15.7246 5.90894 15.1998 5.12348 14.5381 4.46186C13.8765 3.80025 13.0911 3.27542 12.2266 2.91736C11.3622 2.55929 10.4357 2.375 9.5 2.375M9.5 16.625C8.56433 16.625 7.63783 16.4407 6.77338 16.0826C5.90894 15.7246 5.12348 15.1998 4.46186 14.5381C3.80025 13.8765 3.27542 13.0911 2.91736 12.2266C2.55929 11.3622 2.375 10.4357 2.375 9.5C2.375 8.56433 2.55929 7.63783 2.91736 6.77338C3.27542 5.90894 3.80025 5.12348 4.46186 4.46186C5.12348 3.80025 5.90894 3.27542 6.77338 2.91736C7.63783 2.55929 8.56433 2.375 9.5 2.375M9.5 16.625C11.6858 16.625 12.62 12.5376 12.62 9.5C12.62 6.46238 11.6858 2.375 9.5 2.375M9.5 16.625C7.31421 16.625 6.38004 12.5376 6.38004 9.5C6.38004 6.46238 7.31421 2.375 9.5 2.375M2.77083 7.125H16.2292M2.77083 11.875H16.2292"
                                        stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                            </span>
                            <span class="protocol-chevron">
                                <svg xmlns="http://www.w3.org/2000/svg" width="9" height="5" viewBox="0 0 9 5"
                                    fill="none">
                                    <path d="M7.59961 0.599609L4.09961 4.09961L0.599609 0.599609"
                                        stroke="var(--text-gray-to-white)" stroke-width="1.2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                            </span>
                        </div>
                        <input type="text" class="form-control border-start-0 ms-2" placeholder="Domain">
                    </div>
                    <div class="input-group">
                        <div class="input-group-text border-end-0">
                            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M7.84366 7.73548C8.54252 7.73548 9.22569 7.52824 9.80677 7.13998C10.3879 6.75171 10.8408 6.19985 11.1082 5.55419C11.3756 4.90852 11.4456 4.19805 11.3093 3.51262C11.1729 2.82718 10.8364 2.19757 10.3422 1.7034C9.84805 1.20923 9.21844 0.872695 8.53301 0.736354C7.84758 0.600013 7.1371 0.669988 6.49144 0.937431C5.84577 1.20487 5.29392 1.65777 4.90565 2.23886C4.51738 2.81994 4.31014 3.50311 4.31014 4.20197C4.30996 4.66605 4.40123 5.12562 4.57874 5.55441C4.75624 5.9832 5.01651 6.3728 5.34467 6.70096C5.67282 7.02911 6.06243 7.28938 6.49122 7.46689C6.92001 7.6444 7.37958 7.73567 7.84366 7.73548ZM7.84366 9.50188C5.48561 9.50188 0.777344 10.6859 0.777344 13.0354V14.8018H14.91V13.0354C14.91 10.6859 10.2024 9.50188 7.84366 9.50188Z"
                                    fill="var(--primary-color)" />
                            </svg>
                        </div>
                        <input type="text" class="form-control border-start-0" autofocus placeholder="Username">
                    </div>

                    <button type="button" class="gradient-btn" autofocus>Login</button>
                    <p class="forget-password">Forgot Password? <a href="#">Click Here</a></p>
                    <button type="button" autofocus>
                        <span>
                            <svg width="12" height="11" viewBox="0 0 12 11" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M11.0168 9.31568L7.55365 5.85257C7.86786 5.19667 7.97077 4.45943 7.8482 3.74256C7.72562 3.02569 7.3836 2.36452 6.86933 1.85028C5.49652 0.477479 3.2652 0.477479 1.89239 1.85028C0.519588 3.22309 0.519589 5.45441 1.89239 6.82722C2.40663 7.3415 3.0678 7.68351 3.78467 7.80609C4.50154 7.92866 5.23878 7.82575 5.89468 7.51154L6.03984 7.65671L6.03984 9.31568H7.69882V10.9747L11.0334 10.9581L11.0168 9.31568ZM3.13663 5.58298C2.4523 4.89865 2.4523 3.77884 3.13663 3.09452C3.82095 2.41019 4.94076 2.41019 5.62509 3.09452C6.30942 3.77884 6.30942 4.89865 5.62509 5.58298C4.94076 6.26731 3.82095 6.26731 3.13663 5.58298Z"
                                    fill="var(--white-color)" />
                            </svg>
                        </span>
                        Login with OTP
                    </button>
                    <button type="button" autofocus>
                        <span>
                            <svg width="11" height="11" viewBox="0 0 11 11" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M3.90616 0.786133H1.47043C1.17724 0.787588 0.896481 0.904701 0.689165 1.11202C0.481849 1.31933 0.364736 1.6001 0.363281 1.89328V4.32901C0.364736 4.62219 0.481849 4.90296 0.689165 5.11027C0.896481 5.31759 1.17724 5.4347 1.47043 5.43616H3.90616C4.19934 5.4347 4.4801 5.31759 4.68742 5.11027C4.89474 4.90296 5.01185 4.62219 5.0133 4.32901V1.89328C5.01185 1.6001 4.89474 1.31933 4.68742 1.11202C4.4801 0.904701 4.19934 0.787588 3.90616 0.786133ZM3.68473 4.10758H1.69186V2.11471H3.68473V4.10758ZM3.90616 6.32187H1.47043C1.17724 6.32333 0.896481 6.44044 0.689165 6.64776C0.481849 6.85507 0.364736 7.13584 0.363281 7.42902V9.86475C0.364736 10.1579 0.481849 10.4387 0.689165 10.646C0.896481 10.8533 1.17724 10.9704 1.47043 10.9719H3.90616C4.19934 10.9704 4.4801 10.8533 4.68742 10.646C4.89474 10.4387 5.01185 10.1579 5.0133 9.86475V7.42902C5.01185 7.13584 4.89474 6.85507 4.68742 6.64776C4.4801 6.44044 4.19934 6.32333 3.90616 6.32187ZM3.68473 9.64332H1.69186V7.65045H3.68473V9.64332ZM9.4419 0.786133H7.00617C6.71299 0.787588 6.43222 0.904701 6.22491 1.11202C6.01759 1.31933 5.90048 1.6001 5.89902 1.89328V4.32901C5.90048 4.62219 6.01759 4.90296 6.22491 5.11027C6.43222 5.31759 6.71299 5.4347 7.00617 5.43616H9.4419C9.73508 5.4347 10.0158 5.31759 10.2232 5.11027C10.4305 4.90296 10.5476 4.62219 10.549 4.32901V1.89328C10.5476 1.6001 10.4305 1.31933 10.2232 1.11202C10.0158 0.904701 9.73508 0.787588 9.4419 0.786133ZM9.22047 4.10758H7.2276V2.11471H9.22047V4.10758ZM6.56331 8.97903C6.73949 8.97903 6.90846 8.90904 7.03303 8.78446C7.15761 8.65989 7.2276 8.49092 7.2276 8.31474V6.98616C7.2276 6.80998 7.15761 6.64102 7.03303 6.51644C6.90846 6.39186 6.73949 6.32187 6.56331 6.32187C6.38713 6.32187 6.21817 6.39186 6.09359 6.51644C5.96901 6.64102 5.89902 6.80998 5.89902 6.98616V8.31474C5.89902 8.49092 5.96901 8.65989 6.09359 8.78446C6.21817 8.90904 6.38713 8.97903 6.56331 8.97903Z"
                                    fill="var(--white-color)    " />
                                <path
                                    d="M9.88417 7.20798H9.21988V6.98655C9.21988 6.81037 9.14989 6.64141 9.02532 6.51683C8.90074 6.39225 8.73177 6.32227 8.55559 6.32227C8.37941 6.32227 8.21045 6.39225 8.08587 6.51683C7.96129 6.64141 7.8913 6.81037 7.8913 6.98655V9.64371H6.56273C6.38655 9.64371 6.21758 9.7137 6.093 9.83828C5.96843 9.96285 5.89844 10.1318 5.89844 10.308C5.89844 10.4842 5.96843 10.6531 6.093 10.7777C6.21758 10.9023 6.38655 10.9723 6.56273 10.9723H8.55559C8.73177 10.9723 8.90074 10.9023 9.02532 10.7777C9.14989 10.6531 9.21988 10.4842 9.21988 10.308V8.53656H9.88417C10.0604 8.53656 10.2293 8.46657 10.3539 8.342C10.4785 8.21742 10.5485 8.04845 10.5485 7.87227C10.5485 7.69609 10.4785 7.52713 10.3539 7.40255C10.2293 7.27797 10.0604 7.20798 9.88417 7.20798Z"
                                    fill="var(--white-color)" />
                            </svg>
                        </span>
                        Login with QR Code
                    </button>
                </div>
                <!-- INPUT FILEDS :: ENDS -->
            </div>
        </div>

        <!-- LOGIN CONTENT :: ENDS -->
        <!-- RIGHTSIDE CONTENT :: STARTS -->
        <div class="login-right-section">
            <div class="device-img">
                <img alt="DEVICE" class="laptop-img" data-mode="light" data-path="public/app-icon/icon/"
                    data-src="right-side-vector.svg" data-theme="true"
                    src="../public/app-icon/icon/light/right-side-vector.svg"><img alt="DEVICE" class="laptop-img" data-mode="dark" data-path="public/app-icon/icon/"
                    data-src="right-side-vector.svg" data-theme="true"
                    src="../public/app-icon/icon/dark/right-side-vector.svg">
            </div>
            <p class="version-number">Version 3.0</p>
        </div>
        <!-- RIGHTSIDE CONTENT :: ENDS -->
    </div>
    <!-- MAIN CONTAINER :: ENDS -->
    <!-- BOOTSTRAP JS LINK -->
    <script src="../assets/js/jquery.min.js"></script>
    <script src="../assets/js/bootstrap.min.js"></script>

</body>

</html>
