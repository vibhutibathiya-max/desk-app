<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        
        .page-layout { display: flex; flex-direction: column; min-height: 100vh; }
        
        .header-bar {
            background: #16213e; border-bottom: 1px solid #0f3460;
            padding: 16px 24px; flex-shrink: 0; display: flex; align-items: center; gap: 16px;
        }
        .header-bar h1 { font-size: 18px; color: #8ecae6; font-weight: 600; }
        
        .btn { padding: 10px 20px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: linear-gradient(270deg, #6533e2, #1f97ef); color: #fff; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: #0f3460; color: #8ecae6; }
        .btn-secondary:hover { background: #1a4a6e; }
        
        input[type="file"] { display: none; }
        
        .preview-section {
            flex: 1; padding: 24px; overflow-y: auto; background: #0d0d1a;
        }
        .preview-section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #8ecae6; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #0f3460; }
        
        .logo-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .logo-card {
            background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
            overflow: hidden; transition: border-color 0.2s;
        }
        .logo-card:hover { border-color: #8ecae6; }
        
        .logo-preview {
            padding: 20px; min-height: 120px; display: flex; align-items: center; justify-content: center;
            background: #0f3460; border-bottom: 1px solid #0f3460;
        }
        .logo-preview img {
            max-width: 100%; max-height: 100px; object-fit: contain;
        }
        
        .logo-info {
            padding: 12px 16px; font-size: 12px; color: #e0e0e0;
        }
        .logo-info .name { font-weight: 600; color: #fff; margin-bottom: 6px; word-break: break-all; }
        .logo-info .meta { color: #888; }
        .logo-info .meta span { display: inline-block; margin-right: 12px; }
        
        .logo-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .logo-actions .btn { padding: 6px 12px; font-size: 11px; }
        
        .empty-state {
            text-align: center; padding: 60px 20px; color: #666;
        }
        .empty-state p { margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="page-layout">
        <header class="header-bar">
            <h1>Logo Gallery</h1>
            <button class="btn btn-secondary" id="btnUploadFolder">Upload Folder</button>
            <button class="btn btn-secondary" id="btnResetAll">Reset All</button>
            <button class="btn btn-primary" id="btnExportLogos" style="margin-left: auto;">Export Logos (ZIP)</button>
        </header>
        
        <input type="file" id="fileInput" accept=".svg,.png,.jpg,.jpeg,.gif,.webp">
        <input type="file" id="folderInput" webkitdirectory directory multiple accept=".svg,.png,.jpg,.jpeg,.gif,.webp" style="display:none">
        <section class="preview-section">
            <h2>Preview</h2>
            <div id="logoGrid" class="logo-grid"></div>
            <div id="emptyState" class="empty-state">
                <p>Logos load from the logo folder. Use Upload Folder to replace all by same filename, or Upload on each card.</p>
            </div>
        </section>
    </div>
    
    <script src="../assets/js/jszip.js"></script>
    <script>
        const LOGO_FILES = ['logo.svg', 'logo-header.svg', 'logo-white.svg'];
        const LOGO_PATH = '../public/app-icon/logo/';
        const LOGO_FALLBACKS = {
            'logo.svg': ['../public/app-icon/logo/'],
            'logo-header.svg': ['../public/app-icon/logo/'],
            'logo-white.svg': ['../public/app-icon/logo/'],
        };
        /** Logo filename -> page where it appears. Preview opens that page so user sees logo in context. Filename stays same for direct upload on export. */
        const LOGO_TO_PAGE = {
            'logo.svg': 'login.html',
            'logo-header.svg': 'call_history.html',
            'logo-white.svg': 'spashscreen.html',
        };
        const PREVIEW_STORAGE_PREFIX = 'preview-asset:';
        /** Slot -> export path in project. Matches public/app-icon/logo/ structure. */
        const LOGO_TO_EXPORT_PATH = {
            'logo.svg': 'public/app-icon/logo/logo.svg',
            'logo-header.svg': 'public/app-icon/logo/logo-header.svg',
            'logo-white.svg': 'public/app-icon/logo/logo-white.svg',
        };
        let logos = [];
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            return (bytes / 1024).toFixed(2) + ' KB';
        }
        
        function addLogo(data) {
            const { name, src, width, height, sizeKB } = data;
            logos.push({ name, src, width, height, sizeKB, slot: name });
            renderGrid();
        }
        
        function updateLogo(index, data) {
            if (logos[index]?.src?.startsWith('blob:')) URL.revokeObjectURL(logos[index].src);
            const slot = logos[index]?.slot || logos[index]?.name;
            logos[index] = { ...data, slot };
            renderGrid();
        }
        
        function getDimensionsFromSvg(svgText) {
            const w = svgText.match(/width="(\d+)"/)?.[1];
            const h = svgText.match(/height="(\d+)"/)?.[1];
            const vb = svgText.match(/viewBox="[^"]*\d+\s+(\d+)\s+(\d+)\s+(\d+)"/);
            return {
                width: w ? parseInt(w, 10) : (vb ? parseInt(vb[2], 10) : null),
                height: h ? parseInt(h, 10) : (vb ? parseInt(vb[3], 10) : null)
            };
        }
        
        function tryLoadLogo(filename, url, onSuccess, onFail) {
            const img = new Image();
            img.onload = () => onSuccess(url, img);
            img.onerror = () => onFail();
            img.src = url;
        }
        function addLogoFromUrl(filename, url, img) {
            fetch(url).then(r => r.blob()).then(blob => {
                const sizeKB = (blob.size / 1024).toFixed(2) + ' KB';
                addLogo({ name: filename, src: url, width: img.naturalWidth, height: img.naturalHeight, sizeKB });
            }).catch(() => {
                addLogo({ name: filename, src: url, width: img.naturalWidth, height: img.naturalHeight, sizeKB: '—' });
            });
        }
        function loadOneLogo(filename, urls, idx) {
            if (idx >= urls.length) return;
            const url = urls[idx] + filename;
            tryLoadLogo(filename, url,
                (u, img) => addLogoFromUrl(filename, u, img),
                () => loadOneLogo(filename, urls, idx + 1)
            );
        }
        function loadBuiltInLogos() {
            LOGO_FILES.forEach((filename) => {
                const urls = [LOGO_PATH].concat(LOGO_FALLBACKS[filename] || ['../assets/img-new/']);
                loadOneLogo(filename, urls, 0);
            });
        }
        
        function renderGrid() {
            const grid = document.getElementById('logoGrid');
            const empty = document.getElementById('emptyState');
            grid.innerHTML = '';
            
            logos.forEach((logo, index) => {
                const card = document.createElement('div');
                card.className = 'logo-card';
                const dimStr = (logo.width != null && logo.height != null)
                    ? `${logo.width} × ${logo.height}` : '—';
                const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
                const displayName = (logo.slot || logo.name);
                const escName = esc(displayName);
                const escSrc = esc(logo.src);
                card.innerHTML = `
                    <div class="logo-preview">
                        <img src="${escSrc}" alt="${escName}" loading="lazy">
                    </div>
                    <div class="logo-info">
                        <div class="name">${escName}</div>
                        <div class="meta">
                            <span>Dimensions: ${dimStr}</span>
                            <span>Size: ${logo.sizeKB}</span>
                        </div>
                        <div class="logo-actions">
                            <button class="btn btn-primary btn-upload" data-index="${index}">Upload</button>
                            <button class="btn btn-secondary btn-preview" data-index="${index}">Preview</button>
                            <button class="btn btn-secondary btn-clear-override" data-index="${index}" title="Clear preview override">Clear</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            grid.querySelectorAll('.btn-upload').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.index, 10);
                    fileInput.dataset.uploadIndex = idx;
                    fileInput.click();
                });
            });
            grid.querySelectorAll('.btn-preview').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.index, 10);
                    const logo = logos[idx];
                    if (!logo) return;
                    const slot = logo.slot || logo.name;
                    const page = LOGO_TO_PAGE[slot];
                    if (page) {
                        window.open(page, '_blank', 'noopener');
                    } else {
                        if (logo.src) window.open(logo.src, '_blank', 'noopener');
                    }
                });
            });
            grid.querySelectorAll('.btn-clear-override').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.index, 10);
                    const logo = logos[idx];
                    const slot = logo?.slot || logo?.name;
                    if (slot) {
                        localStorage.removeItem(PREVIEW_STORAGE_PREFIX + slot);
                        const url = LOGO_PATH + slot;
                        updateLogo(idx, { name: slot, src: url, width: null, height: null, sizeKB: '—', slot });
                        fetch(url).then(r => r.blob()).then(blob => {
                            const sizeKB = (blob.size / 1024).toFixed(2) + ' KB';
                            const img = new Image();
                            img.onload = () => updateLogo(idx, { name: slot, src: url, width: img.naturalWidth, height: img.naturalHeight, sizeKB, slot });
                            img.onerror = () => {};
                            img.src = url;
                        }).catch(() => {});
                    }
                });
            });
            
            empty.style.display = logos.length ? 'none' : 'block';
        }
        
        fileInput.addEventListener('change', (e) => {
            const idx = fileInput.dataset.uploadIndex != null ? parseInt(fileInput.dataset.uploadIndex, 10) : null;
            const file = e.target.files?.[0];
            if (!file || idx == null || idx < 0 || idx >= logos.length) {
                e.target.value = '';
                return;
            }
            const slot = logos[idx]?.slot || logos[idx]?.name;
            const sizeKB = (file.size / 1024).toFixed(2) + ' KB';
            const reader = new FileReader();
            reader.onload = () => {
                const dataUrl = reader.result;
                if (slot) localStorage.setItem(PREVIEW_STORAGE_PREFIX + slot, dataUrl);
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    updateLogo(idx, {
                        name: slot,
                        src: url,
                        width: img.naturalWidth,
                        height: img.naturalHeight,
                        sizeKB,
                        slot
                    });
                };
                img.onerror = () => {
                    updateLogo(idx, { name: slot, src: url, width: null, height: null, sizeKB, slot });
                };
                img.src = url;
            };
            reader.readAsDataURL(file);
            e.target.value = '';
            delete fileInput.dataset.uploadIndex;
        });
        
        document.getElementById('btnUploadFolder').addEventListener('click', () => folderInput.click());
        folderInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files || []);
            let applied = 0;
            files.forEach(file => {
                const name = file.name;
                if (!/\.(svg|png|jpg|jpeg|gif|webp)$/i.test(name)) return;
                const idx = logos.findIndex(l => (l.slot || l.name) === name);
                if (idx < 0) return;
                const slot = logos[idx]?.slot || logos[idx]?.name;
                const sizeKB = (file.size / 1024).toFixed(2) + ' KB';
                const reader = new FileReader();
                reader.onload = () => {
                    const dataUrl = reader.result;
                    if (slot) localStorage.setItem(PREVIEW_STORAGE_PREFIX + slot, dataUrl);
                    const url = URL.createObjectURL(file);
                    const img = new Image();
                    img.onload = () => {
                        updateLogo(idx, { name: slot, src: url, width: img.naturalWidth, height: img.naturalHeight, sizeKB, slot });
                        applied++;
                    };
                    img.onerror = () => {
                        updateLogo(idx, { name: slot, src: url, width: null, height: null, sizeKB, slot });
                        applied++;
                    };
                    img.src = url;
                };
                reader.readAsDataURL(file);
            });
            e.target.value = '';
        });
        
        document.getElementById('btnResetAll').addEventListener('click', () => {
            logos.forEach(l => { if (l?.src?.startsWith('blob:')) URL.revokeObjectURL(l.src); });
            LOGO_FILES.forEach(f => localStorage.removeItem(PREVIEW_STORAGE_PREFIX + f));
            logos = [];
            loadBuiltInLogos();
        });
        
        loadBuiltInLogos();
        
        document.getElementById('btnExportLogos').addEventListener('click', async function() {
            if (typeof JSZip === 'undefined') {
                alert('JSZip not loaded. Add script: src="../assets/js/jszip.js"');
                return;
            }
            if (logos.length === 0) {
                alert('No logos to export. Wait for logos to load or refresh the page.');
                return;
            }
            const zip = new JSZip();
            for (const logo of logos) {
                const slot = logo.slot || logo.name;
                const exportPath = LOGO_TO_EXPORT_PATH[slot] || 'public/app-icon/logo/' + slot;
                let blob;
                const stored = localStorage.getItem(PREVIEW_STORAGE_PREFIX + slot);
                if (stored && stored.startsWith('data:')) {
                    const res = await fetch(stored);
                    blob = await res.blob();
                } else if (logo.src && logo.src.startsWith('blob:')) {
                    const res = await fetch(logo.src);
                    blob = await res.blob();
                } else {
                    try {
                        const res = await fetch(logo.src);
                        blob = await res.blob();
                    } catch (e) {
                        console.warn('Could not fetch:', logo.src);
                        continue;
                    }
                }
                zip.file(exportPath, blob);
            }
            zip.file('LOGO-INSTALL.txt', 'Logo Export – Installation\n' +
                '================================\n\n' +
                '1. Extract this ZIP to your project ROOT directory.\n' +
                '2. Overwrite existing files when prompted.\n' +
                '3. Logos use original filenames (logo.svg, etc.) – no code changes needed.\n');
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(zipBlob);
            a.download = 'logo.zip';
            a.click();
            URL.revokeObjectURL(a.href);
        });
    </script>
</body>
</html>
