<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White-Label Theme Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        
        .preview-layout { display: flex; height: 100vh; }
        
        /* Theme Panel */
        .theme-panel {
            width: 360px; min-width: 360px; background: #16213e; border-right: 1px solid #0f3460;
            overflow-y: auto; padding: 16px; flex-shrink: 0;
        }
        .theme-panel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #8ecae6; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #0f3460; }
        .theme-panel h3 { font-size: 12px; color: #aaa; margin: 12px 0 8px; }
        
        .control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; min-height: 44px; }
        .control-row label { flex: 0 0 120px; font-size: 12px; color: #e0e0e0; line-height: 1.2; }
        .control-row .color-inputs { display: flex; align-items: center; gap: 8px; flex: 1; }
        .control-row input[type="color"] { width: 56px; height: 48px; min-width: 56px; border: 2px solid #0f3460; cursor: pointer; border-radius: 8px; padding: 3px; background: #0f3460; box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }
        .control-row input[type="color"]:hover { border-color: #8ecae6; }
        .control-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
        .control-row input[type="color"]::-webkit-color-swatch { border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); }
        .control-row input[type="text"] { flex: 1; min-width: 80px; max-width: 120px; padding: 10px 12px; font-size: 13px; background: #0f3460; border: 2px solid #0f3460; color: #fff; border-radius: 6px; }
        .control-row input[type="text"]:focus { outline: none; border-color: #8ecae6; }
        .control-row.gradient-row { flex-direction: column; align-items: stretch; margin-bottom: 14px; }
        .control-row.gradient-row label { flex: none; margin-bottom: 6px; }
        .gradient-colors { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .gradient-color-item { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .gradient-color-item span { font-size: 10px; color: #888; min-width: 30px; }
        .gradient-color-item input[type="color"] { width: 52px; height: 44px; min-width: 52px; border: 2px solid #0f3460; cursor: pointer; border-radius: 6px; padding: 2px; }
        .gradient-color-item input[type="color"]:hover { border-color: #8ecae6; }
        .gradient-color-item input[type="text"] { width: 88px; padding: 10px; font-size: 12px; background: #0f3460; border: 2px solid #0f3460; color: #fff; border-radius: 6px; }
        
        .btn { padding: 8px 16px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: linear-gradient(270deg, #6533e2, #1f97ef); color: #fff; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: #0f3460; color: #8ecae6; }
        .btn-secondary:hover { background: #1a4a6e; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        
        .page-select { width: 100%; padding: 10px 12px; font-size: 13px; background: #0f3460; border: 1px solid #0f3460; color: #fff; border-radius: 6px; margin-bottom: 16px; cursor: pointer; }
        .page-select:focus { outline: none; border-color: #8ecae6; }
        
        .theme-toggle { display: flex; gap: 4px; margin-bottom: 16px; }
        .theme-toggle button { flex: 1; padding: 10px; font-size: 12px; border: 1px solid #0f3460; background: #0f3460; color: #8ecae6; border-radius: 6px; cursor: pointer; }
        .theme-toggle button.active { background: linear-gradient(270deg, #6533e2, #1f97ef); color: #fff; border-color: transparent; }
        
        .preview-frame-wrap { flex: 1; position: relative; background: #0d0d1a; }
        .preview-frame { width: 100%; height: 100%; border: none; display: block; }
        
        .gradient-note { font-size: 10px; color: #666; margin-top: 4px; }
        .section { margin-bottom: 16px; }
        .asset-details { margin-top: 12px; font-size: 11px; }
        .asset-details summary { cursor: pointer; color: #8ecae6; padding: 4px 0; }
        .asset-details summary:hover { text-decoration: underline; }
        .asset-slots-list { margin-top: 8px; padding: 8px; background: #0f3460; border-radius: 6px; color: #ccc; }
        .asset-table { width: 100%; font-size: 10px; border-collapse: collapse; margin: 8px 0; }
        .asset-table th, .asset-table td { padding: 4px 6px; text-align: left; border-bottom: 1px solid #1a4a6e; }
        .asset-table th { color: #8ecae6; }
        .asset-table code { font-size: 9px; background: #16213e; padding: 1px 4px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="preview-layout">
        <aside class="theme-panel">
            <h2>White-Label Theme</h2>
            
            <label style="font-size:12px;color:#aaa;display:block;margin-bottom:4px">Preview Page</label>
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
                <select class="page-select" id="pageSelect" style="flex:1;min-width:0;margin-bottom:0">
                    <option value="login.html">Login</option>
                <option value="call_history.html">Call History</option>
                <option value="call_connecting.html">Call Connecting</option>
                <option value="call_connecting_video.html">Call Connecting (Video)</option>
                <option value="active_call_dtmf.html">Active Call DTMF</option>
                <option value="add_group_member.html">Add Group Member</option>
                <option value="all_contact.html">All Contact</option>
                <option value="contact_detail.html">Contact Detail</option>
                <option value="group_chat_edit.html">Group Chat Edit</option>
                <option value="group_chat_with_admin_alarts.html">Group Chat Admin</option>
                <option value="incoming_call_popup.html">Incoming Call Popup</option>
                <option value="in-coming-call-notification.html">Incoming Call Notification</option>
                <option value="attachment_preview.html">Attachment Preview</option>
                <option value="loader.html">Loader</option>
                <option value="chat_loader.html">Chat Loader</option>
                <option value="autostartup.html">Auto Startup</option>
                <option value="setting.html">Setting</option>
                <option value="logo-gallery.html">Logo Gallery</option>
                <option value="icon-gallery.html">Icon Gallery</option>
                </select>
                <a href="logo-gallery.html" target="_blank" rel="noopener" class="btn btn-primary" style="flex-shrink:0;text-decoration:none;display:inline-flex;align-items:center">Logo Gallery</a>
                <a href="icon-gallery.html" target="_blank" rel="noopener" class="btn btn-primary" style="flex-shrink:0;text-decoration:none;display:inline-flex;align-items:center">Icon Gallery</a>
            </div>
            
            <label style="font-size:12px;color:#aaa;display:block;margin-bottom:4px">Theme Mode</label>
            <div class="theme-toggle">
                <button type="button" id="btnLight" class="active">Light</button>
                <button type="button" id="btnDark">Dark</button>
            </div>
            
            <div id="lightColorsSection" class="section">
                <h3>Light Mode Colors</h3>
                <div id="lightColors"></div>
            </div>
            
            <div id="darkColorsSection" class="section" style="display:none">
                <h3>Dark Mode Colors</h3>
                <div id="darkColors"></div>
            </div>
            
            <div class="section">
                <h3>Upload Custom Style</h3>
                <input type="file" id="styleFileInput" accept=".css" style="display:none">
                <div class="btn-group">
                    <button class="btn btn-secondary" id="btnUploadStyle">Upload Style File (.css)</button>
                    <button class="btn btn-secondary" id="btnClearUploaded" style="display:none">Clear Uploaded</button>
                </div>
                <p class="gradient-note" id="uploadedFileName"></p>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" id="btnExportFull">Export Full Theme (ZIP)</button>
                <button class="btn btn-primary" id="btnExport">Export Theme JSON</button>
                <button class="btn btn-primary" id="btnExportCss">Export global.css</button>
                <button class="btn btn-secondary" id="btnReset">Reset All</button>
            </div>
            
            <p style="font-size:10px;color:#666;margin-top:16px;line-height:1.4">
                <strong>Logo Gallery</strong> – Upload logos via Logo Gallery button above. Replace by same filename, export as logo.zip.<br>
                <strong>Export Full Theme</strong> – ZIP with global.css. Extract to project root – no code changes.
            </p>
        </aside>
        
        <div class="preview-frame-wrap">
            <iframe class="preview-frame" id="previewFrame" src="login.html"></iframe>
        </div>
    </div>
    
    <script src="../assets/js/jszip.js"></script>
    <script>
        const CONFIG_URL = 'whitelabel-config.json';
        let config = { light: {}, dark: {} };
        let currentTheme = 'light';
        const ASSET_PATH_MAP = {
            'logo-color.svg': 'assets/img-new/logo-color.svg',
            'logo.svg': 'assets/img-new/logo.svg',
            'logo-header.svg': 'public/app-icon/logo/logo-header.svg',
            'logo-white.svg': 'public/app-icon/logo/logo-white.svg',
            'curves.svg': 'assets/img-new/curves.svg',
            'curves-2.svg': 'assets/img-new/curves-2.svg',
            'right-side-vector.svg': ['public/app-icon/icon/light/right-side-vector.svg', 'public/app-icon/icon/dark/right-side-vector.svg'],
            'arrow-down.svg': 'assets/img-new/arrow-down.svg',
            'online.svg': 'assets/img-new/online.svg',
            'away.svg': 'assets/img-new/away.svg',
            'busy.svg': 'assets/img-new/busy.svg',
            'dnd.svg': 'assets/img-new/dnd.svg',
            'api-test-connection.svg': ['public/app-icon/icon/light/api-test-connection.svg', 'public/app-icon/icon/dark/api-test-connection.svg'],
            'autoStartup.svg': ['public/app-icon/icon/light/autoStartup.svg', 'public/app-icon/icon/dark/autoStartup.svg'],
            'blind-trasferred.svg': ['public/app-icon/icon/light/blind-trasferred.svg', 'public/app-icon/icon/dark/blind-trasferred.svg'],
            'check-mail.svg': ['public/app-icon/icon/light/check-mail.svg', 'public/app-icon/icon/dark/check-mail.svg'],
            'clear-history.svg': ['public/app-icon/icon/light/clear-history.svg', 'public/app-icon/icon/dark/clear-history.svg'],
            'cloud-contact-banner.svg': ['public/app-icon/icon/light/cloud-contact-banner.svg', 'public/app-icon/icon/dark/cloud-contact-banner.svg'],
            'done.svg': ['public/app-icon/icon/light/done.svg', 'public/app-icon/icon/dark/done.svg'],
            'export-icon.svg': ['public/app-icon/icon/light/export-icon.svg', 'public/app-icon/icon/dark/export-icon.svg'],
            'import-icon.svg': ['public/app-icon/icon/light/import-icon.svg', 'public/app-icon/icon/dark/import-icon.svg'],
            'logout.svg': ['public/app-icon/icon/light/logout.svg', 'public/app-icon/icon/dark/logout.svg'],
            'no-calls-found.svg': ['public/app-icon/icon/light/no-calls-found.svg', 'public/app-icon/icon/dark/no-calls-found.svg'],
            'no-contacts-found.svg': ['public/app-icon/icon/light/no-contacts-found.svg', 'public/app-icon/icon/dark/no-contacts-found.svg'],
            'no-favoritecontact-found.svg': ['public/app-icon/icon/light/no-favoritecontact-found.svg', 'public/app-icon/icon/dark/no-favoritecontact-found.svg'],
            'qr-vector.svg': ['public/app-icon/icon/light/qr-vector.svg', 'public/app-icon/icon/dark/qr-vector.svg'],
            're-register.svg': ['public/app-icon/icon/light/re-register.svg', 'public/app-icon/icon/dark/re-register.svg'],
            'sip-configuration.svg': ['public/app-icon/icon/light/sip-configuration.svg', 'public/app-icon/icon/dark/sip-configuration.svg'],
            'start-chat.svg': ['public/app-icon/icon/light/start-chat.svg', 'public/app-icon/icon/dark/start-chat.svg'],
            'web-socket-connection.svg': ['public/app-icon/icon/light/web-socket-connection.svg', 'public/app-icon/icon/dark/web-socket-connection.svg'],
            'web-socket-failed.svg': ['public/app-icon/icon/light/web-socket-failed.svg', 'public/app-icon/icon/dark/web-socket-failed.svg']
        };
        function getAssetPaths(filename) {
            const mapped = ASSET_PATH_MAP[filename];
            if (Array.isArray(mapped)) return mapped;
            if (mapped) return [mapped];
            return ['assets/img-new/' + filename];
        }
        
        async function loadConfig() {
            const res = await fetch(CONFIG_URL);
            config = await res.json();
            return config;
        }
        
        function parseGradientColors(str) {
            const matches = (str || '').match(/#[0-9A-Fa-f]{6}|#[0-9A-Fa-f]{3}(?![0-9A-Fa-f])/g);
            return matches ? [...matches.slice(0, 4)].map(c => toHex6(c) || c) : ['#6533e2', '#7349de', '#1f97ef'];
        }
        function toHex6(hex) {
            if (!hex || !/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(String(hex).trim())) return hex;
            const h = String(hex).trim().slice(1);
            if (h.length === 3) return '#' + h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
            return hex;
        }
        function isHexColor(val) {
            return val && /^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(String(val).trim());
        }
        function buildGradient(colors, angle) {
            const c = colors.filter(x => x && isHexColor(x)).map(x => toHex6(x));
            if (!c.length) return 'linear-gradient(270deg, #6533e2 0%, #1f97ef 100%)';
            const pcts = c.length === 2 ? [0, 100] : c.length === 3 ? [0, 50, 100] : [0, 33, 66, 100];
            const stops = c.map((col, i) => `${col} ${pcts[i] || 0}%`).join(', ');
            return `linear-gradient(${angle || '270deg'}, ${stops})`;
        }
        
        function createColorInput(key, item, mode) {
            const isGradient = item.type === 'gradient';
            const isImage = item.type === 'image';
            const wrapper = document.createElement('div');
            wrapper.className = isGradient ? 'control-row gradient-row' : 'control-row';
            wrapper.dataset.var = item.var;
            wrapper.dataset.mode = mode;
            
            const label = document.createElement('label');
            label.textContent = item.label;
            wrapper.appendChild(label);
            
            if (isGradient) {
                const colors = parseGradientColors(item.value);
                const angle = (item.value || '').match(/(\d+(?:\.\d+)?deg)/)?.[1] || '270deg';
                wrapper.dataset.angle = angle;
                const gradientVars = item.gradientVars || [item.var];
                const gradientEl = document.createElement('div');
                gradientEl.className = 'gradient-colors';
                
                const labels = colors.length === 4 ? ['Start', 'Mid1', 'Mid2', 'End'] : ['Start', 'Mid', 'End'];
                colors.forEach((col, i) => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'gradient-color-item';
                    const span = document.createElement('span');
                    span.textContent = labels[i];
                    const colorInput = document.createElement('input');
                    colorInput.type = 'color';
                    colorInput.value = col;
                    colorInput.title = 'Click to pick color';
                    const textInput = document.createElement('input');
                    textInput.type = 'text';
                    textInput.value = col;
                    textInput.placeholder = '#000000';
                    textInput.title = 'Enter hex (e.g. #ff0000)';
                    const updateGradient = () => {
                        let hex = colorInput.value;
                        if (!hex || !isHexColor(hex)) hex = isHexColor(textInput.value) ? toHex6(textInput.value) : toHex6(col) || col;
                        hex = toHex6(hex) || hex;
                        colorInput.value = hex;
                        textInput.value = hex;
                        const allColorInputs = gradientEl.querySelectorAll('input[type="color"]');
                        const collected = Array.from(allColorInputs).map(inp => (inp.value || '').trim()).filter(Boolean);
                        const grad = buildGradient(collected.length ? collected : [hex], angle);
                        injectOverrideStyle();
                    };
                    colorInput.addEventListener('input', updateGradient);
                    colorInput.addEventListener('change', updateGradient);
                    textInput.addEventListener('input', () => {
                        if (isHexColor(textInput.value)) colorInput.value = toHex6(textInput.value);
                        updateGradient();
                    });
                    itemEl.appendChild(span);
                    itemEl.appendChild(colorInput);
                    itemEl.appendChild(textInput);
                    gradientEl.appendChild(itemEl);
                });
                wrapper.appendChild(gradientEl);
            } else if (isImage) {
                const inputsWrap = document.createElement('div');
                inputsWrap.className = 'color-inputs';
                const textInput = document.createElement('input');
                textInput.type = 'text';
                textInput.value = item.value || '';
                textInput.placeholder = 'url(...) or upload';
                textInput.title = 'CSS url() or upload file';
                textInput.style.flex = '1';
                textInput.style.minWidth = '100px';
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '.svg,.png,.jpg,.jpeg,.gif,.webp';
                fileInput.style.display = 'none';
                const uploadBtn = document.createElement('button');
                uploadBtn.type = 'button';
                uploadBtn.className = 'btn btn-secondary';
                uploadBtn.textContent = 'Upload';
                uploadBtn.style.padding = '6px 12px';
                uploadBtn.style.fontSize = '11px';
                uploadBtn.onclick = () => fileInput.click();
                fileInput.addEventListener('change', (e) => {
                    const file = e.target.files?.[0];
                    if (!file) return;
                    const blobUrl = URL.createObjectURL(file);
                    const urlVal = `url("${blobUrl}")`;
                    textInput.value = urlVal;
                    const assetPath = item.assetPath || 'assets/img-new/' + file.name;
                    addUploadedAsset(assetPath, file);
                    updateAssetsInfo();
                    applyVar(item.var, urlVal);
                    injectOverrideStyle();
                    applyAllStored();
                    e.target.value = '';
                });
                textInput.addEventListener('input', () => {
                    applyVar(item.var, textInput.value);
                    injectOverrideStyle();
                });
                inputsWrap.appendChild(textInput);
                inputsWrap.appendChild(uploadBtn);
                wrapper.appendChild(inputsWrap);
            } else {
                const isHex = isHexColor(item.value);
                const inputsWrap = document.createElement('div');
                inputsWrap.className = 'color-inputs';
                const textInput = document.createElement('input');
                textInput.type = 'text';
                textInput.value = item.value || (isHex ? '#614b98' : '');
                textInput.placeholder = isHex ? '#000000' : 'e.g. transparent, url(...)';
                textInput.title = isHex ? 'Enter hex color (e.g. #ff0000 or #f00)' : 'Enter CSS value';
                textInput.style.flex = '1';
                if (isHex) {
                    const colorInput = document.createElement('input');
                    colorInput.type = 'color';
                    colorInput.title = 'Click to pick color';
                    colorInput.value = toHex6(item.value) || '#614b98';
                    colorInput.addEventListener('input', () => {
                        textInput.value = colorInput.value;
                        injectOverrideStyle();
                    });
                    textInput.addEventListener('input', () => {
                        if (isHexColor(textInput.value)) colorInput.value = toHex6(textInput.value);
                        injectOverrideStyle();
                    });
                    inputsWrap.appendChild(colorInput);
                } else {
                    textInput.addEventListener('input', () => injectOverrideStyle());
                }
                inputsWrap.appendChild(textInput);
                wrapper.appendChild(inputsWrap);
            }
            
            return wrapper;
        }
        
        function renderControls() {
            const lightEl = document.getElementById('lightColors');
            const darkEl = document.getElementById('darkColors');
            if (!lightEl) return;
            lightEl.innerHTML = '';
            if (darkEl) darkEl.innerHTML = '';
            
            for (const [key, item] of Object.entries(config.light || {})) {
                if (item.type === 'gradient') continue;
                lightEl.appendChild(createColorInput(key, item, 'light'));
            }
            for (const [key, item] of Object.entries(config.light || {})) {
                if (item.type === 'gradient') lightEl.appendChild(createColorInput(key, item, 'light'));
            }
            
            if (config.dark && darkEl) {
                for (const [key, item] of Object.entries(config.dark)) {
                    if (item.type === 'gradient') continue;
                    darkEl.appendChild(createColorInput(key, item, 'dark'));
                }
                for (const [key, item] of Object.entries(config.dark)) {
                    if (item.type === 'gradient') darkEl.appendChild(createColorInput(key, item, 'dark'));
                }
            }
        }
        
        function getFrameDoc() {
            const frame = document.getElementById('previewFrame');
            try {
                return frame.contentDocument || frame.contentWindow?.document;
            } catch (e) { return null; }
        }
        
        const OVERRIDE_STYLE_ID = 'whitelabel-overrides';
        const UPLOADED_STYLE_ID = 'whitelabel-uploaded-css';
        let uploadedCssContent = null;
        let uploadedAssets = {}; // path -> { file, blobUrl }
        function applyVar(varName, value) {
            const doc = getFrameDoc();
            if (doc && doc.documentElement && value) {
                doc.documentElement.style.setProperty(varName, value);
            }
        }
        /** Dark-mode vars that elements use directly (e.g. SVGs use --primary-color, not --primary-color-dark) */
        const DARK_ALIAS_MAP = { '--primary-color-dark': '--primary-color', '--black-color-dark': '--black-color', '--gray-color-dark': '--gray-color', '--text-dark-gray-dark': '--text-dark-gray', '--white-color-dark': '--white-color' };
        function injectOverrideStyle() {
            const doc = getFrameDoc();
            if (!doc || !doc.documentElement) return;
            let style = doc.getElementById(OVERRIDE_STYLE_ID);
            if (!style) {
                style = doc.createElement('style');
                style.id = OVERRIDE_STYLE_ID;
                (doc.head || doc.documentElement).appendChild(style);
            }
            const colors = currentTheme === 'light' ? (config.light || {}) : (config.dark || {});
            const lines = [];
            const valueByVar = {};
            for (const [key, item] of Object.entries(colors)) {
                const wrapper = document.querySelector(`[data-var="${item.var}"][data-mode="${currentTheme}"]`);
                if (!wrapper) continue;
                if (item.type === 'gradient') {
                    const val = getGradientValueFromWrapper(wrapper);
                    if (val) {
                        const vars = new Set(item.gradientVars || [item.var]);
                        if (key === 'buttonGradient') vars.add('--btn-gradient');
                        if (key === 'headerGradient') vars.add('--header-gadient');
                        vars.forEach(v => { lines.push(`${v}: ${val};`); valueByVar[v] = val; });
                    }
                } else {
                    const input = wrapper.querySelector('input[type="text"]') || wrapper.querySelector('input[type="color"]');
                    const val = input ? input.value : item.value;
                    if (val) { lines.push(`${item.var}: ${val};`); valueByVar[item.var] = val; }
                }
            }
            if (currentTheme === 'dark') {
                for (const [darkVar, aliasVar] of Object.entries(DARK_ALIAS_MAP)) {
                    if (valueByVar[darkVar] && !valueByVar[aliasVar]) lines.push(`${aliasVar}: ${valueByVar[darkVar]} !important;`);
                }
            }
            const selector = `html[data-theme="${currentTheme}"]`;
            style.textContent = lines.length ? `${selector} { ${lines.join(' ')} }` : '';
        }
        
        function applyTheme(theme) {
            currentTheme = theme;
            const lightSection = document.getElementById('lightColorsSection');
            const darkSection = document.getElementById('darkColorsSection');
            if (lightSection) lightSection.style.display = theme === 'light' ? 'block' : 'none';
            if (darkSection) darkSection.style.display = theme === 'dark' ? 'block' : 'none';
            applyAllStored();
        }
        
        function getGradientValueFromWrapper(wrapper) {
            const items = wrapper?.querySelectorAll('.gradient-color-item');
            if (!items?.length) return null;
            const colors = [];
            items.forEach(it => {
                const inp = it.querySelector('input[type="color"]') || it.querySelector('input[type="text"]');
                if (inp?.value) colors.push(inp.value);
            });
            const angle = wrapper?.dataset?.angle || '270deg';
            return colors.length ? buildGradient(colors, angle) : null;
        }
        function injectUploadedStyle() {
            const doc = getFrameDoc();
            if (!doc || !doc.documentElement || !uploadedCssContent) return;
            let style = doc.getElementById(UPLOADED_STYLE_ID);
            if (!style) {
                style = doc.createElement('style');
                style.id = UPLOADED_STYLE_ID;
                (doc.head || doc.documentElement).appendChild(style);
            }
            style.textContent = uploadedCssContent;
        }
        
        function removeUploadedStyle() {
            const doc = getFrameDoc();
            const style = doc?.getElementById(UPLOADED_STYLE_ID);
            if (style) style.remove();
        }
        
        const ASSET_OVERRIDE_STYLE_ID = 'whitelabel-asset-overrides';
        function applyUploadedAssets() {
            const doc = getFrameDoc();
            if (!doc || !doc.documentElement) return;
            const imgs = doc.querySelectorAll('img[src]');
            imgs.forEach(img => {
                const src = img.getAttribute('src') || '';
                for (const [assetPath, data] of Object.entries(uploadedAssets)) {
                    const assetFilename = assetPath.split('/').pop();
                    if (src.includes(assetFilename) || src.includes(assetPath)) {
                        img.src = data.blobUrl;
                        break;
                    }
                }
            });
            doc.querySelectorAll('[style*="background-image"]').forEach(el => {
                const bg = el.style.backgroundImage || '';
                const urlMatch = bg.match(/url\(['"]?([^'")]+)['"]?\)/);
                if (urlMatch) {
                    const urlPath = urlMatch[1];
                    for (const [assetPath, data] of Object.entries(uploadedAssets)) {
                        const assetFilename = assetPath.split('/').pop();
                        if (urlPath.includes(assetFilename)) {
                            el.style.backgroundImage = `url("${data.blobUrl}")`;
                            break;
                        }
                    }
                }
            });
            const curvesData = Object.entries(uploadedAssets).find(([p]) => p.includes('curves.svg'));
            if (curvesData) {
                let style = doc.getElementById(ASSET_OVERRIDE_STYLE_ID);
                if (!style) { style = doc.createElement('style'); style.id = ASSET_OVERRIDE_STYLE_ID; (doc.head || doc.documentElement).appendChild(style); }
                style.textContent = `:root { --curves-bg-image: url("${curvesData[1].blobUrl}"); --curves-bg-image-dark: url("${curvesData[1].blobUrl}"); }`;
            } else {
                const style = doc.getElementById(ASSET_OVERRIDE_STYLE_ID);
                if (style) style.remove();
            }
        }
        
        function addUploadedAsset(assetPath, file) {
            if (uploadedAssets[assetPath]?.blobUrl) URL.revokeObjectURL(uploadedAssets[assetPath].blobUrl);
            uploadedAssets[assetPath] = { file, blobUrl: URL.createObjectURL(file) };
        }
        function updateAssetsInfo() {
            const el = document.getElementById('uploadedAssetsInfo');
            if (el) el.textContent = Object.keys(uploadedAssets).length ? Object.keys(uploadedAssets).length + ' asset(s)' : '';
        }
        
        
        let applyRetryCount = 0;
        function applyAllStored() {
            const doc = getFrameDoc();
            if (!doc || !doc.documentElement) {
                if (applyRetryCount < 3) {
                    applyRetryCount++;
                    setTimeout(() => applyAllStored(), 300);
                }
                return;
            }
            applyRetryCount = 0;
            doc.documentElement.setAttribute('data-theme', currentTheme);
            doc.documentElement.dataset.theme = currentTheme;
            if (uploadedCssContent) injectUploadedStyle();
            else removeUploadedStyle();
            injectOverrideStyle();
            applyUploadedAssets();
        }
        
        function getExportedValues() {
            const light = {}, dark = {};
            for (const [key, item] of Object.entries(config.light)) {
                const wrapper = document.querySelector(`[data-var="${item.var}"][data-mode="light"]`);
                let val;
                if (item.type === 'gradient') val = getGradientValueFromWrapper(wrapper);
                else if (item.type === 'image') {
                    val = (wrapper?.querySelector('input[type="text"]'))?.value;
                    if (val && val.includes('blob:') && item.assetPath) val = 'url(../' + item.assetPath.replace(/^assets\//, '') + ')';
                    if (!val) val = item.value;
                } else val = (wrapper?.querySelector('input[type="text"]') || wrapper?.querySelector('input[type="color"]'))?.value;
                light[key] = val || item.value;
            }
            for (const [key, item] of Object.entries(config.dark || {})) {
                const wrapper = document.querySelector(`[data-var="${item.var}"][data-mode="dark"]`);
                let val;
                if (item.type === 'gradient') val = getGradientValueFromWrapper(wrapper);
                else if (item.type === 'image') {
                    val = (wrapper?.querySelector('input[type="text"]'))?.value;
                    if (val && val.includes('blob:') && item.assetPath) val = 'url(../' + item.assetPath.replace(/^assets\//, '') + ')';
                    if (!val) val = item.value;
                } else val = (wrapper?.querySelector('input[type="text"]') || wrapper?.querySelector('input[type="color"]'))?.value;
                dark[key] = val || item.value;
            }
            return { light, dark };
        }
        
        function exportTheme() {
            const { light, dark } = getExportedValues();
            const exportData = {
                exportedAt: new Date().toISOString(),
                meta: config.meta || {},
                light: {},
                dark: {}
            };
            for (const [k, v] of Object.entries(light)) exportData.light[k] = { var: config.light[k]?.var, value: v };
            for (const [k, v] of Object.entries(dark)) exportData.dark[k] = { var: config.dark?.[k]?.var, value: v };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'whitelabel-theme.json';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        /* Maps whitelabel keys to CSS vars in global.css. Derived vars (based on primary, etc.) get same value. */
        const GLOBAL_CSS_MAP = {
            light: {
                primaryColor: ['--primary-color', '--sidebar-active-icon', '--received-chat-bubble-file-icon-light'],
                secondaryColor: ['--secondary-color'],
                mainGradientStart: ['--main-gradient-color'],
                buttonGradient: ['--button-gradient'],
                headerGradient: ['--header-gadient-color'],
                dynamicBarColor: ['--dynamic-bar-color'],
                dynamicBarIconColor: ['--dynamic-bar-icon-color'],
                crmPrimaryLight: ['--crm-primary-light'],
                tertiary: ['--tertiary-light']
            },
            dark: {
                primaryColor: ['--primary-color-dark', '--sidebar-active-icon-dark'],
                secondaryColor: ['--secondary-color-dark'],
                mainGradient: ['--main-gradient-color-dark'],
                buttonGradient: ['--button-gradient-dark'],
                headerGradient: ['--header-gadient-color-dark'],
                dynamicBarColor: ['--dynamic-bar-color'],
                dynamicBarIconColor: ['--dynamic-bar-icon-color'],
                crmPrimaryDark: ['--crm-primary-dark'],
                tertiary: ['--tertiary-dark']
            }
        };
        
        const GLOBAL_CSS_FALLBACK = `/* Main product defaults - 9 whitelabel vars */
:root {
  --primary-color: #614b98;
  --secondary-color: #57a1d7;
  --main-gradient-color: linear-gradient(223.54deg, #6533e2 6.23%, #7349de 35.08%, #1f97ef 99.36%, #57a1d7 147.44%);
  --header-gadient-color: linear-gradient(270deg, #6533e2 0.26%, #7349de 30.28%, #1f97ef 97.16%);
  --button-gradient: linear-gradient(270deg, #6533e2 0.26%, #7349de 30.28%, #1f97ef 97.16%);
  --dynamic-bar-color: #5834d3;
  --dynamic-bar-icon-color: #6940de;
  --crm-primary-light: #fff;
  --tertiary-light: #7962B1;
}

:root {
  --primary-color-dark: #3F3D52;
  --secondary-color-dark: #6B6778;
  --main-gradient-color-dark: linear-gradient(255.04deg, #18162C 6.1%, #2B2A3C 30.7%, #18162C 85.52%);
  --header-gadient-color-dark: linear-gradient(255.04deg, #18162C 6.1%, #2B2A3C 30.7%, #18162C 85.52%);
  --button-gradient-dark: linear-gradient(90deg, #2A2744 0%, #2D2C3A 100%);
  --crm-primary-dark: #18162C;
  --tertiary-dark: #6B6778;
}`;

        function exportCss() {
            const { light, dark } = getExportedValues();
            const varRegex = (v) => new RegExp(`(${v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}:\\s*)[^;]+`, 'gs');
            
            const doExport = (css) => {
                let out = css;
                for (const [key, globalVars] of Object.entries(GLOBAL_CSS_MAP.light)) {
                    const val = light[key];
                    if (val && globalVars) globalVars.forEach(v => { out = out.replace(varRegex(v), `$1${val}`); });
                }
                for (const [key, globalVars] of Object.entries(GLOBAL_CSS_MAP.dark)) {
                    const val = dark[key];
                    if (val && globalVars) globalVars.forEach(v => { out = out.replace(varRegex(v), `$1${val}`); });
                }
                const blob = new Blob([out], { type: 'text/css' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'global.css';
                a.click();
                URL.revokeObjectURL(a.href);
            };
            fetch('../assets/css/global.css').then(r => r.text()).then(doExport).catch(() => doExport(GLOBAL_CSS_FALLBACK));
        }
        
        async function exportFullTheme() {
            const zip = new JSZip();
            const { light, dark } = getExportedValues();
            const varRegex = (v) => new RegExp(`(${v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}:\\s*)[^;]+`, 'gs');
            let cssContent = await fetch('../assets/css/global.css').then(r => r.text()).catch(() => GLOBAL_CSS_FALLBACK);
            if (!cssContent) cssContent = GLOBAL_CSS_FALLBACK;
            for (const [key, globalVars] of Object.entries(GLOBAL_CSS_MAP.light)) {
                const val = light[key];
                if (val && globalVars) globalVars.forEach(v => { cssContent = cssContent.replace(varRegex(v), `$1${val}`); });
            }
            for (const [key, globalVars] of Object.entries(GLOBAL_CSS_MAP.dark)) {
                const val = dark[key];
                if (val && globalVars) globalVars.forEach(v => { cssContent = cssContent.replace(varRegex(v), `$1${val}`); });
            }
            zip.file('assets/css/global.css', cssContent);
            for (const [assetPath, data] of Object.entries(uploadedAssets)) {
                zip.file(assetPath, data.file);
            }
            const iconFiles = ['api-test-connection.svg','autoStartup.svg','blind-trasferred.svg','check-mail.svg','clear-history.svg','cloud-contact-banner.svg','done.svg','export-icon.svg','import-icon.svg','logout.svg','no-calls-found.svg','no-contacts-found.svg','no-favoritecontact-found.svg','qr-vector.svg','re-register.svg','right-side-vector.svg','sip-configuration.svg','start-chat.svg','web-socket-connection.svg','web-socket-failed.svg'];
            function dataUrlToBinary(dataUrl) {
                if (!dataUrl || !dataUrl.startsWith('data:')) return null;
                const comma = dataUrl.indexOf(',');
                if (comma < 0) return null;
                const payload = dataUrl.slice(comma + 1);
                if (dataUrl.slice(0, comma).includes('base64')) {
                    try {
                        const binary = atob(payload);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        return bytes;
                    } catch (e) { return null; }
                }
                try { return new TextEncoder().encode(decodeURIComponent(payload)); } catch (e) { return null; }
            }
            for (const filename of iconFiles) {
                const lightData = localStorage.getItem('preview-asset:icon-light:' + filename);
                const darkData = localStorage.getItem('preview-asset:icon-dark:' + filename);
                const lightPath = 'public/app-icon/icon/light/' + filename;
                const darkPath = 'public/app-icon/icon/dark/' + filename;
                let bin;
                if (lightData && (bin = dataUrlToBinary(lightData))) zip.file(lightPath, bin);
                else try { const r = await fetch('../public/app-icon/icon/light/' + filename); if (r.ok) zip.file(lightPath, await r.blob()); } catch (e) {}
                if (darkData && (bin = dataUrlToBinary(darkData))) zip.file(darkPath, bin);
                else try { const r = await fetch('../public/app-icon/icon/dark/' + filename); if (r.ok) zip.file(darkPath, await r.blob()); } catch (e) {}
            }
            zip.file('WHITELABEL-INSTALL.txt', 'White-Label Theme Installation\n' +
                '================================\n\n' +
                '1. Extract this ZIP to your project ROOT directory.\n' +
                '2. Overwrite existing files when prompted.\n' +
                '3. No code changes required - assets and CSS are replaced.\n\n' +
                'Contents: assets/css/global.css (colors) + uploaded images (logo, icons from Logo/Icon Gallery).\n' +
                'Icons: public/app-icon/icon/light/*.svg and dark/*.svg\n');
            const blob = await zip.generateAsync({ type: 'blob' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'whitelabel-theme.zip';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        function resetAll() {
            for (const data of Object.values(uploadedAssets)) {
                if (data.blobUrl) URL.revokeObjectURL(data.blobUrl);
            }
            uploadedAssets = {};
            loadConfig().then(() => {
                renderControls();
                document.getElementById('btnLight').classList.add('active');
                document.getElementById('btnDark').classList.remove('active');
                currentTheme = 'light';
                uploadedCssContent = null;
                document.getElementById('uploadedFileName').textContent = '';
                document.getElementById('btnClearUploaded').style.display = 'none';
                document.getElementById('styleFileInput').value = '';
                applyTheme('light');
                if (frame && currentSrc) { frame.src = ''; frame.src = currentSrc; }
            }).catch(() => {
                renderControls();
                document.getElementById('btnLight').classList.add('active');
                document.getElementById('btnDark').classList.remove('active');
                currentTheme = 'light';
                uploadedCssContent = null;
                document.getElementById('uploadedFileName').textContent = '';
                document.getElementById('btnClearUploaded').style.display = 'none';
                document.getElementById('styleFileInput').value = '';
                if (frame && currentSrc) { frame.src = ''; frame.src = currentSrc; }
                applyTheme('light');
            });
        }
        
        document.getElementById('pageSelect').addEventListener('change', (e) => {
            document.getElementById('previewFrame').src = e.target.value;
            // Theme/styles applied via iframe 'load' event - no fixed timeout
        });
        
        document.getElementById('btnLight').addEventListener('click', () => {
            document.getElementById('btnLight').classList.add('active');
            document.getElementById('btnDark').classList.remove('active');
            applyTheme('light');
        });
        
        document.getElementById('btnDark').addEventListener('click', () => {
            document.getElementById('btnDark').classList.add('active');
            document.getElementById('btnLight').classList.remove('active');
            applyTheme('dark');
        });
        
        document.getElementById('btnUploadStyle').addEventListener('click', () => document.getElementById('styleFileInput').click());
        document.getElementById('styleFileInput').addEventListener('change', (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                uploadedCssContent = ev.target?.result || null;
                document.getElementById('uploadedFileName').textContent = 'Loaded: ' + file.name;
                document.getElementById('btnClearUploaded').style.display = 'inline-block';
                applyAllStored();
            };
            reader.readAsText(file);
            e.target.value = '';
        });
        document.getElementById('btnClearUploaded').addEventListener('click', () => {
            uploadedCssContent = null;
            document.getElementById('uploadedFileName').textContent = '';
            document.getElementById('btnClearUploaded').style.display = 'none';
            document.getElementById('styleFileInput').value = '';
            applyAllStored();
        });
        
        document.getElementById('btnExport').addEventListener('click', exportTheme);
        document.getElementById('btnExportFull').addEventListener('click', () => exportFullTheme());
        document.getElementById('btnExportCss').addEventListener('click', exportCss);
        document.getElementById('btnReset').addEventListener('click', resetAll);
        
        document.getElementById('previewFrame').addEventListener('load', () => {
            setTimeout(() => applyAllStored(), 600);
        });
        window.addEventListener('storage', function(e) {
            if (e.key && e.key.indexOf('preview-asset:icon-') === 0) {
                const frame = document.getElementById('previewFrame');
                if (frame && frame.src) { frame.src = frame.src; }
            }
        });
        
        loadConfig().then(() => {
            renderControls();
            applyTheme('light');
        });
    </script>
</body>
</html>
