<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- CSS LINK -->
        <link rel="stylesheet" href="../assets/css/style.css">
        <!-- BOOTSTRAP CSS LINK -->
        <link href="../assets/css/bootstrap.min.css" rel="stylesheet" />
        <link href="../assets/css/bootstrap.min.css.map" rel="stylesheet" />
    </head>
    <body> 
        <!-- INCOMING CALL POPUP :: STARTS -->
        <div class="incoming-call-notification d-flex flex-column align-items-center" id="active-call-detail">
        <div class="incoming-call-header d-flex align-items-center justify-content-between w-100">
            <img class="img-fluid flex-shrink-0"  src="../public/app-icon/logo/notification_logo.svg" alt="LOGO">
            <button id="silent_minimize" type="button" class="btn lh-1 p-1 shadow-none border-0">
                <svg width="16" height="3" viewBox="0 0 16 3" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14.8204 1.20312L1.35547 1.20312" stroke="var(--white-color)" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
            </button>
        </div>
        <div class="incoming-call-popup">
           <div class="d-flex align-items-center">
            <div class="incoming-call-icon">
                AJ
            </div>
            <div class="incoming-caller-name text-start ms-4">
                <p class="mb-0">Alex James</p>
                <span class="mb-0">Incoming call...</span>
            </div>
           </div>
            <div class="incoming-call-options">
                <button class="video-call-btn">
                    <img src="../assets/img-new/popup-video.svg" alt="VIDEO CALL" width="" height="">
                </button>
                <button class="audio-call-btn">
                    <img src="../assets/img-new/popup-audio.svg" alt="AUDIO CALL" width="" height="">
                </button>
                <button class="declin-call-btn">
                    <img src="../assets/img-new/popup-decline.svg" alt="DECLINE CALL" width="" height="">
                </button>
            </div>
        </div>
        </div>
        <!-- INCOMING CALL POPUP :: ENDS -->
        <!-- BOOTSTRAP JQUERY/POPPER JS LINK -->
        <script src="../assets/js/popper.min.js"></script>
        <script src="../assets/js/jquery.min.js" type="text/javascript"></script>
        <script src="../assets/js/bootstrap.bundle.min.js" type="text/javascript"></script>
    </body>
</html>
